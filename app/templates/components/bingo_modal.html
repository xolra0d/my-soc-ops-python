<div class="fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50" style="background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(2px);">
    <div class="bg-white rounded-xl p-6 max-w-xs w-full text-center shadow-xl animate-neon-glow" style="background: #1a1a1a; border: 4px solid #39ff14; box-shadow: 0 0 40px #39ff14, 0 0 80px #ff006e, 0 0 120px #00f5ff;">
        <div class="text-5xl mb-4" style="font-size: 3rem;">▸▸▸</div>
        <h2 class="text-3xl font-bold text-amber-500 mb-2" style="color: #ffff00; text-shadow: 0 0 15px #ffff00, 0 0 30px #ff006e; font-family: 'Press Start 2P', cursive; letter-spacing: 3px; font-size: 2rem;">BINGO!</h2>
        <p class="text-gray-600 mb-6" style="color: #39ff14; text-shadow: 0 0 10px #39ff14; font-weight: 700; letter-spacing: 1px; font-size: 1.1rem;">YOU COMPLETED A LINE!</p>

        <button
            hx-post="/dismiss-modal"
            hx-target="#game-container"
            hx-swap="outerHTML"
            class="w-full bg-accent text-white font-semibold py-3 px-6 rounded-lg active:bg-accent-light transition-colors"
            style="background: #ff006e; border: 3px solid #ffff00; color: #ffff00; font-size: 1rem; font-weight: 700; letter-spacing: 2px; text-shadow: 0 0 10px #ffff00; box-shadow: 0 0 25px #ff006e, 0 0 40px #00f5ff, inset 0 -4px 0 #ffff00;">
            ▶ KEEP PLAYING ◀
        </button>
    </div>
</div>
